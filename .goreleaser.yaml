# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: caddy-gateway
before:
  hooks:
    - go mod tidy
    - bash -c 'if [ -n "$(git --no-pager diff --exit-code go.mod go.sum)" ]; then exit 1; fi'

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

gomod:
  proxy: true

report_sizes: true

builds:
  - id: caddy-gateway
    binary: caddy-gateway
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
      - freebsd
    goarch:
      - amd64
      - arm
      - arm64
      - s390x
      - ppc64le
      - riscv64
    goarm:
      - "5"
      - "6"
      - "7"
    ignore:
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: ppc64le
      - goos: darwin
        goarch: s390x
      - goos: darwin
        goarch: riscv64
      - goos: windows
        goarch: ppc64le
      - goos: windows
        goarch: s390x
      - goos: windows
        goarch: riscv64
      - goos: windows
        goarch: arm
      - goos: freebsd
        goarch: ppc64le
      - goos: freebsd
        goarch: s390x
      - goos: freebsd
        goarch: riscv64
      - goos: freebsd
        goarch: arm
        goarm: "5"
    flags:
      - -trimpath

kos:
  - build: caddy-gateway
    repositories:
      - "{{ .Env.GITHUB_REPOSITORY_OWNER }}/{{ .ProjectName }}"
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/{{ .ProjectName }}"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/s390x
      - linux/arm
      - linux/ppc64le
      - linux/riscv64
      - darwin/amd64
      - darwin/arm64
      - windows/amd64
      - windows/arm64
      - freebsd/amd64
      - freebsd/arm64
      - freebsd/arm
    tags:
      - "{{ .Tag }}"
      # TODO: find a way to set the latest package tag, only when the release gets published on GitHub.
      # We can trigger an action on release_published, but we then need to write a system that "pushes"
      # the `latest` manifest.
      - "{{ if not .Prerelease }}latest{{ end }}"
    creation_time: "{{ .CommitTimestamp }}"
    ko_data_creation_time: "{{ .CommitTimestamp }}"
    sbom: "spdx"
    bare: true
    preserve_import_paths: false
    base_image: gcr.io/distroless/static:nonroot
    labels:
      org.opencontainers.image.description: "Kubernetes Gateway API implementation powered by Caddy"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.name: "{{ .ProjectName }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.version: "{{ .Version }}"

checksum:
  algorithm: sha256
  name_template: checksums.txt

sboms:
  - artifacts: binary
    cmd: syft
    args:
      - "${artifact}"
      - --file
      - "${document}"
      - --output
      - spdx-json

docker_signs:
  - cmd: cosign
    artifacts: all
    output: true
    args:
      - sign
      - --yes
      - "${artifact}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^chore(:|\()'
      - '^perf(:|\()'
      - '^readme(:|\()'
      - '^refactor(:|\()'
      - '^style(:|\()'
      - '^tests?(:|\()'
      - '^\w+\s+' # a hack to remove commit messages without colons thus don't correspond to a package
  groups:
    - title: Added
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 100
    # Changed
    # Deprecated
    # Removed
    - title: Fixed
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 500
    - title: Security
      regexp: '^.*?sec(\(.+\))??!?:.+$'
      order: 600
    - title: Dependencies
      regexp: '^.*?chore\(deps\)!?:.+$'
      order: 700
    - title: Documentation
      regexp: ^.*?docs?(\(.+\))??!?:.+$
      order: 800
    - title: CI
      regexp: ^.*?(build|ci)(\(.+\))??!?:.+$
      order: 900
    - title: Other work
      order: 9999

release:
  draft: true
  prerelease: auto
  footer: |
    **Full Changelog**: {{ .GitURL }}/compare/{{ .PreviousTag }}...{{ .Tag }}
