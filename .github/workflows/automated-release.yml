name: Trigger Release on Renovate bot & Dependabot updates

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - go.mod
      - go.sum
      - main.go
      - "**/config/**"
      - "**/example/**"
      - "**/hack/**"
      - "**/internal/**"

jobs:
  release:
    runs-on: ubuntu-latest

    # if: |
    #   startsWith(github.event.head_commit.message, 'Update ') || startsWith(github.event.head_commit.message, 'chore: ')

    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Determine next patch version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)

          echo "Current version: $LAST_TAG"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_TAG"

          PATCH=$((PATCH + 1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          echo "New version: $NEW_VERSION"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update project files to new version
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Chart.yaml
          sed -i "s/^version:.*/version: ${VERSION}/" ./chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" ./chart/Chart.yaml

          # values.yaml
          sed -i "s/tag:.*/tag: \"${VERSION}\"/g" ./chart/values.yaml

          # Makefile bundle version
          sed -i "s/^VERSION ?=.*/VERSION ?= ${VERSION}/" ./Makefile

          # e2e project image version
          sed -i "s#projectimage := \".*:v.*\"#projectimage := \"ghcr.io/butlergroup/caddy-gateway/caddy-gateway:v${VERSION}\"#" ./test/e2e/e2e_test.go

      - name: Update CHANGELOG.md
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          DATE=$(date +%m-%d-%Y)

          SAFE_COMMIT_MSG=$(printf '%s\n' "$COMMIT_MSG")

          DEP=""
          FROM_VERSION=""
          TO_VERSION=""
          CHANGE_TEXT=""

          #
          # Renovate examples:
          #
          # Update cgr.dev/chainguard/wolfi-base Docker digest to cccc183
          # Update cgr.dev/chainguard/wolfi-base Docker tag to 20260520
          #

          DEP=$(printf '%s\n' "$SAFE_COMMIT_MSG" | sed -n \
            's/^Update \(.*\) Docker .*$/\1/p')

          TO_VERSION=$(printf '%s\n' "$SAFE_COMMIT_MSG" | sed -n \
            's/^.* to \(.*\)$/\1/p')

          if [ -n "$DEP" ]; then
            CHANGE_TEXT="- Updated ${DEP} to ${TO_VERSION} through automated dependency management"
          fi

          #
          # Dependabot examples:
          #
          # chore: Bump k8s.io/api from 0.36.0 to 0.36.1
          #

          if [ -z "$DEP" ]; then
            DEP=$(printf '%s\n' "$SAFE_COMMIT_MSG" | sed -n \
              's/^.*Bump \(.*\) from .*$/\1/p')

            FROM_VERSION=$(printf '%s\n' "$SAFE_COMMIT_MSG" | sed -n \
              's/^.*from \(.*\) to .*$/\1/p')

            TO_VERSION=$(printf '%s\n' "$SAFE_COMMIT_MSG" | sed -n \
              's/^.*to \(.*\)$/\1/p')

            if [ -n "$DEP" ]; then
              CHANGE_TEXT="- Updated ${DEP} from ${FROM_VERSION} to ${TO_VERSION} through automated dependency management"
            fi
          fi

          #
          # Final fallback
          #

          if [ -z "$CHANGE_TEXT" ]; then
            CHANGE_TEXT="- Updated dependency(s) through automated dependency management"
          fi

          echo "Detected dependency: $DEP"
          echo "From: $FROM_VERSION"
          echo "To: $TO_VERSION"

          cat > changelog_entry.md <<EOF
          ## Caddy Gateway API & Helm Chart Version ${VERSION} (${DATE})

          #### New Features

          #### Improvements

          ${CHANGE_TEXT}

          #### Fixes

          ---

          EOF

          cat changelog_entry.md CHANGELOG.md > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit version updates
        run: |
          git add ./chart/Chart.yaml \
                  ./chart/values.yaml \
                  ./Makefile \
                  ./test/e2e/e2e_test.go \
                  CHANGELOG.md

          git commit -m "chore(release): dependency updated. Bump project version to ${{ steps.version.outputs.version }}" || true

          git push origin HEAD:master

      - name: Verify GitHub App secret availability
        shell: bash
        env:
          APP_ID: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "$APP_ID" ]]; then
            echo "::error::APP_ID is empty"
            exit 1
          fi

          if [[ -z "$APP_PRIVATE_KEY" ]]; then
            echo "::error::APP_PRIVATE_KEY is empty/unavailable in this workflow context"
            exit 1
          fi

          if ! grep -q "BEGIN .*PRIVATE KEY" <<< "$APP_PRIVATE_KEY"; then
            echo "::error::APP_PRIVATE_KEY does not look like a PEM private key"
            exit 1
          fi

          echo "GitHub App inputs are present"

      - name: Generate GitHub App installation token manually
        id: app-token
        shell: bash
        env:
          APP_ID: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          private_key_file="$(mktemp)"
          trap 'rm -f "$private_key_file"' EXIT
          printf '%s\n' "$APP_PRIVATE_KEY" > "$private_key_file"

          now="$(date +%s)"
          iat="$((now - 60))"
          exp="$((now + 540))"

          b64url() {
            openssl base64 -A | tr '+/' '-_' | tr -d '='
          }

          header="$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)"
          payload="$(printf '{"iat":%s,"exp":%s,"iss":"%s"}' "$iat" "$exp" "$APP_ID" | b64url)"
          unsigned_token="${header}.${payload}"

          signature="$(
            printf '%s' "$unsigned_token" |
              openssl dgst -sha256 -sign "$private_key_file" -binary |
              b64url
          )"

          jwt="${unsigned_token}.${signature}"

          installation_id="$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $jwt" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/installation" |
              jq -r '.id'
          )"

          if [[ -z "$installation_id" || "$installation_id" == "null" ]]; then
            echo "::error::Could not determine GitHub App installation ID for $REPO"
            exit 1
          fi

          token="$(
            curl -fsSL \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $jwt" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/app/installations/$installation_id/access_tokens" |
              jq -r '.token'
          )"

          if [[ -z "$token" || "$token" == "null" ]]; then
            echo "::error::GitHub App installation token was empty"
            exit 1
          fi

          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Create new tag & release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CURRENT_SHA="$(git rev-parse HEAD)"

          gh api \
            --method POST \
            "repos/${{ github.repository }}/git/refs" \
            -f "ref=refs/tags/${VERSION}" \
            -f "sha=${CURRENT_SHA}"
