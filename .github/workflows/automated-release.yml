name: Trigger Release on Renovate bot & Dependabot updates

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - go.mod
      - go.sum
      - main.go
      - "**/config/**"
      - "**/example/**"
      - "**/hack/**"
      - "**/internal/**"

jobs:
  release:
    runs-on: ubuntu-latest

    # if: |
    #   startsWith(github.event.head_commit.message, 'Update ') || startsWith(github.event.head_commit.message, 'chore: ')

    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Determine next patch version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)

          echo "Current version: $LAST_TAG"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_TAG"

          PATCH=$((PATCH + 1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          echo "New version: $NEW_VERSION"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update project files to new version
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Chart.yaml
          sed -i "s/^version:.*/version: ${VERSION}/" ./chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" ./chart/Chart.yaml

          # values.yaml
          sed -i "s/tag:.*/tag: \"${VERSION}\"/g" ./chart/values.yaml

          # Makefile bundle version
          sed -i "s/^VERSION ?=.*/VERSION ?= ${VERSION}/" ./Makefile

          # e2e project image version
          sed -i "s#projectimage := \".*:v.*\"#projectimage := \"ghcr.io/butlergroup/caddy-gateway/caddy-gateway:v${VERSION}\"#" ./test/e2e/e2e_test.go

      - name: Update CHANGELOG.md
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          DATE=$(date +%m-%d-%Y)

          if [[ -n "${BEFORE_SHA:-}" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            RANGE="${BEFORE_SHA}..${AFTER_SHA}"
          else
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
            if [[ -n "$LAST_TAG" ]]; then
              RANGE="${LAST_TAG}..HEAD"
            else
              RANGE="HEAD"
            fi
          fi

          echo "Using changelog commit range: $RANGE"

          git log --format='%s%n%b%n---END-COMMIT---' "$RANGE" > release_messages.txt

          awk '
            BEGIN { IGNORECASE = 1 }

            {
              line = $0
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)

              # Dependabot:
              # chore: Bump k8s.io/api from 0.36.0 to 0.36.1
              # Bump github.com/foo/bar from 1.2.3 to 1.2.4
              if (match(line, /Bump[[:space:]]+(.+)[[:space:]]+from[[:space:]]+([^[:space:]]+)[[:space:]]+to[[:space:]]+([^[:space:]]+)/, m)) {
                print "- Updated " m[1] " from " m[2] " to " m[3] " through automated dependency management"
                next
              }

              # Renovate:
              # Update cgr.dev/chainguard/wolfi-base Docker digest to cccc183
              # Update dependency actions/checkout to v6.0.3
              # chore(deps): update dependency foo to v1.2.3
              if (match(line, /Update[[:space:]]+(dependency[[:space:]]+|module[[:space:]]+|package[[:space:]]+|image[[:space:]]+)?(.+)[[:space:]]+to[[:space:]]+([^[:space:]]+)/, m)) {
                dep = m[2]
                to = m[3]

                gsub(/[[:space:]]+Docker[[:space:]]+(digest|tag)$/, "", dep)
                gsub(/[[:space:]]+$/, "", dep)

                print "- Updated " dep " to " to " through automated dependency management"
                next
              }

              # Renovate grouped PRs:
              # chore(deps): update all non-major dependencies
              if (line ~ /update.*dependencies/) {
                print "- " line
                next
              }

              # Automated go.mod updates:
              if (match(line, /^-?[[:space:]]*Updated[[:space:]]+(.+)[[:space:]]+from[[:space:]]+([^[:space:]]+)[[:space:]]+to[[:space:]]+([^[:space:]]+)/, m)) {
                print "- Updated " m[1] " from " m[2] " to " m[3] " through automated dependency management"
                next
              }

              if (match(line, /^-?[[:space:]]*Added[[:space:]]+(.+)[[:space:]]+at[[:space:]]+([^[:space:]]+)/, m)) {
                print "- Added " m[1] " at " m[2] " through automated dependency management"
                next
              }
            }
          ' release_messages.txt | sort -u > detected_changes.txt

          if [[ -s detected_changes.txt ]]; then
            CHANGE_TEXT="$(cat detected_changes.txt)"
          else
            CHANGE_TEXT="- Updated dependency(s) through automated dependency management"
          fi

          echo "Detected changelog text:"
          printf '%s\n' "$CHANGE_TEXT"

          cat > changelog_entry.md <<EOF
          ## Caddy Gateway API & Helm Chart Version ${VERSION} (${DATE})

          #### New Features

          #### Improvements

          ${CHANGE_TEXT}

          #### Fixes

          ---

          EOF

          cat changelog_entry.md CHANGELOG.md > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit version updates
        run: |
          git add ./chart/Chart.yaml \
                  ./chart/values.yaml \
                  ./Makefile \
                  ./test/e2e/e2e_test.go \
                  CHANGELOG.md

          git commit -m "chore(release): dependency updated. Bump project version to ${{ steps.version.outputs.version }}" || true

          git push origin HEAD:master

      - name: Verify GitHub App secret availability
        shell: bash
        env:
          APP_ID: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "$APP_ID" ]]; then
            echo "::error::APP_ID is empty"
            exit 1
          fi

          if [[ -z "$APP_PRIVATE_KEY" ]]; then
            echo "::error::APP_PRIVATE_KEY is empty/unavailable in this workflow context"
            exit 1
          fi

          if ! grep -q "BEGIN .*PRIVATE KEY" <<< "$APP_PRIVATE_KEY"; then
            echo "::error::APP_PRIVATE_KEY does not look like a PEM private key"
            exit 1
          fi

          echo "GitHub App inputs are present"

      - name: Generate GitHub App installation token manually
        id: app-token
        shell: bash
        env:
          APP_ID: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          private_key_file="$(mktemp)"
          trap 'rm -f "$private_key_file"' EXIT
          printf '%s\n' "$APP_PRIVATE_KEY" > "$private_key_file"

          now="$(date +%s)"
          iat="$((now - 60))"
          exp="$((now + 540))"

          b64url() {
            openssl base64 -A | tr '+/' '-_' | tr -d '='
          }

          header="$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)"
          payload="$(printf '{"iat":%s,"exp":%s,"iss":"%s"}' "$iat" "$exp" "$APP_ID" | b64url)"
          unsigned_token="${header}.${payload}"

          signature="$(
            printf '%s' "$unsigned_token" |
              openssl dgst -sha256 -sign "$private_key_file" -binary |
              b64url
          )"

          jwt="${unsigned_token}.${signature}"

          owner="${REPO%%/*}"
          repo_name="${REPO#*/}"

          echo "Looking up GitHub App installation for $REPO"

          installation_json="$(
            curl -sS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $jwt" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/installation"
          )"

          installation_id="$(jq -r '.id // empty' <<< "$installation_json")"

          if [[ -z "$installation_id" ]]; then
            echo "Repo installation lookup did not return an installation ID."
            echo "Trying owner-level installation lookup for $owner"

            installation_json="$(
              curl -sS \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer $jwt" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/orgs/$owner/installation"
            )"

            installation_id="$(jq -r '.id // empty' <<< "$installation_json")"
          fi

          if [[ -z "$installation_id" ]]; then
            echo "::error::Could not determine GitHub App installation ID for $REPO. Confirm the app is installed on owner '$owner' and has access to repo '$repo_name'."
            echo "$installation_json" | jq -r '.message // empty'
            exit 1
          fi

          token_json="$(
            curl -sS \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $jwt" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/app/installations/$installation_id/access_tokens" \
              -d "$(jq -nc \
                --arg repo "$repo_name" \
                '{
                  repositories: [$repo],
                  permissions: {
                    contents: "write",
                    pull_requests: "write",
                    checks: "read",
                    actions: "write"
                  }
                }')"
          )"

          token="$(jq -r '.token // empty' <<< "$token_json")"

          if [[ -z "$token" ]]; then
            echo "::error::GitHub App installation token was empty"
            echo "$token_json" | jq -r '.message // empty'
            exit 1
          fi

          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Create new tag & release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CURRENT_SHA="$(git rev-parse HEAD)"

          gh api \
            --method POST \
            "repos/${{ github.repository }}/git/refs" \
            -f "ref=refs/tags/${VERSION}" \
            -f "sha=${CURRENT_SHA}"
